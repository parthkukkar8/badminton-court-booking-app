services:

  mongodb:
    image: mongo:6.0
    container_name: badminton-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - badminton-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: badminton-redis
    ports:
      - "6379:6379"
    networks:
      - badminton-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: badminton-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:29093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    networks:
      - badminton-network
    restart: unless-stopped

  auth-service:
    build: ./services/auth-service
    container_name: badminton-auth
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongodb:27017/badminton-auth
      - REDIS_URL=redis://redis:6379
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRES=15m
      - JWT_REFRESH_EXPIRES=7d
      - SESSION_SECRET=${SESSION_SECRET}
      - ALLOWED_ADMIN_EMAIL=${ALLOWED_ADMIN_EMAIL}
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped
    networks:
      - badminton-network

  court-service:
    build: ./services/court-service
    container_name: badminton-courts
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGO_URI=mongodb://mongodb:27017/badminton-courts
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - ALLOWED_ADMIN_EMAIL=${ALLOWED_ADMIN_EMAIL}
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped
    networks:
      - badminton-network

  booking-service:
    build: ./services/booking-service
    container_name: badminton-bookings
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGO_URI=mongodb://mongodb:27017/badminton-bookings
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - COURT_SERVICE_URL=http://court-service:3002
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped
    networks:
      - badminton-network
    

  payment-service:
    build: ./services/payment-service
    container_name: badminton-payments
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - MONGO_URI=mongodb://mongodb:27017/badminton-payments
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - mongodb
      - redis
      - kafka
    restart: unless-stopped
    networks:
      - badminton-network

  notification-service:
    build: ./services/notification-service
    container_name: badminton-notifications
    environment:
      - KAFKA_BROKER=kafka:9092
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - badminton-network

  api-gateway:
    build: ./services/api-gateway
    container_name: badminton-gateway
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - COURT_SERVICE_URL=http://court-service:3002
      - BOOKING_SERVICE_URL=http://booking-service:3003
      - PAYMENT_SERVICE_URL=http://payment-service:3004
    depends_on:
      - auth-service
      - court-service
      - booking-service
      - payment-service
    restart: unless-stopped
    networks:
      - badminton-network

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
    container_name: badminton-frontend
    ports:
      - "5173:5173"
    restart: unless-stopped
    networks:
      - badminton-network

  admin-portal:
    build: ./admin-portal
    container_name: badminton-admin
    ports:
      - "5174:5174"
    restart: unless-stopped
    networks:
      - badminton-network

volumes:
  mongodb_data:

networks:
  badminton-network:
    driver: bridge